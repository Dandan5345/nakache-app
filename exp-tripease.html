<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripEase - סרטוני הסבר</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            color: #334e68;
        }
        .container {
            background-color: #ffffff;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 85%;
            transition: transform 0.3s ease;
        }
        .container:hover {
            transform: translateY(-5px);
        }
        .icon {
            font-size: 72px;
            margin-bottom: 25px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        h1 {
            font-weight: 700;
            font-size: 32px;
            margin-bottom: 15px;
            margin-top: 0;
            color: #102a43;
        }
        p {
            font-size: 22px;
            font-weight: 400;
            line-height: 1.5;
            color: #486581;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎥</div>
        <h1>TripEase</h1>
        <p>בקרוב יופיעו כאן סרטוני הסבר על שימוש באפליקציה</p>
    </div>
</body>
</html>
